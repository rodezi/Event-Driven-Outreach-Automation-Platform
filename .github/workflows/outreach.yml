name: Realtek Email Pipeline

on:
  schedule:
    - cron: "0 13 * * *"   # 7:00 AM CST (UTC-6) todos los días
  workflow_dispatch:
    inputs:
      max_emails:
        description: "Máximo de emails a enviar (default: 100)"
        required: false
        default: "100"
        type: string

jobs:
  send-emails:
    name: Sheet → Send 100 emails
    runs-on: ubuntu-latest
    timeout-minutes: 360   # 6 h máx (delay 2-3 min × 100 emails)

    env:
      GOOGLE_SERVICE_ACCOUNT_JSON:   ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      GOOGLE_SPREADSHEET_ID:         ${{ secrets.GOOGLE_SPREADSHEET_ID }}
      RESEND_API_KEY:                ${{ secrets.RESEND_API_KEY }}
      RESEND_FROM_EMAILS:            ${{ secrets.RESEND_FROM_EMAILS }}
      SEND_DELAY_MIN_SECONDS:        "120"
      SEND_DELAY_MAX_SECONDS:        "180"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python + uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: uv sync

      - name: Escribir Service Account JSON a archivo temporal
        run: |
          echo "$GOOGLE_SERVICE_ACCOUNT_JSON" > /tmp/sa.json
          echo "GOOGLE_SERVICE_ACCOUNT_JSON=/tmp/sa.json" >> $GITHUB_ENV

      - name: Enriquecer emails desde sitios web
        run: uv run python email_enricher.py --limit 300

      - name: Enviar emails
        run: |
          MAX=${{ github.event.inputs.max_emails || '100' }}
          uv run python main.py --max-emails "$MAX"
