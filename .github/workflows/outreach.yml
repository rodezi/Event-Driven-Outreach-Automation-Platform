name: Outreach Pipeline

on:
  schedule:
    # GitHub Actions cron uses UTC.
    # 19:00 America/Mexico_City currently maps to 01:00 UTC the next day
    # because Mexico City does not currently observe daylight saving time.
    - cron: "0 1 * * *"
  workflow_dispatch:
    inputs:
      max_emails:
        description: "Maximum emails to send in this execution"
        required: false
        default: "100"
        type: string

jobs:
  outreach:
    name: Sync contacts and send outreach
    runs-on: ubuntu-latest
    timeout-minutes: 360
    concurrency:
      group: outreach-pipeline
      cancel-in-progress: false

    env:
      EASYBROKER_API_KEY: ${{ secrets.EASYBROKER_API_KEY }}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      GOOGLE_SPREADSHEET_ID: ${{ secrets.GOOGLE_SPREADSHEET_ID }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      RESEND_FROM_EMAILS: ${{ secrets.RESEND_FROM_EMAILS }}
      RESEND_WEBHOOK_SECRET: ${{ secrets.RESEND_WEBHOOK_SECRET }}
      OUTREACH_TIMEZONE: America/Mexico_City
      EMAIL_DELAY_MIN_SECONDS: "120"
      EMAIL_DELAY_MAX_SECONDS: "180"
      LOG_LEVEL: INFO

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv and Python
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Validate pending email domains
        run: uv run python validate_emails.py

      - name: Run outreach pipeline
        run: |
          MAX="${{ github.event.inputs.max_emails || '100' }}"
          uv run python -m outreach_system.cli --run-now --max-emails "$MAX"
