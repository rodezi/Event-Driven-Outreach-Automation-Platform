name: Realtek Outreach Pipeline

on:
  schedule:
    # 01:00 UTC = 19:00 CST México (UTC-6, permanente desde 2023).
    - cron: "0 1 * * *"
  workflow_dispatch:
    inputs:
      max_emails:
        description: "Máximo de emails a enviar en esta corrida (0 = sin límite)"
        required: false
        default: "100"
        type: string
      days_back:
        description: "Días hacia atrás en el filtro de EasyBroker (0 = hoy, 1 = ayer)"
        required: false
        default: "0"
        type: string

jobs:
  pipeline:
    name: Fetch → Sheet → Send
    runs-on: ubuntu-latest
    timeout-minutes: 360   # 6 h máx (delay 2-3 min × emails)

    env:
      EASYBROKER_API_KEY:            ${{ secrets.EASYBROKER_API_KEY }}
      GOOGLE_SERVICE_ACCOUNT_JSON:   ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      GOOGLE_SPREADSHEET_ID:         ${{ secrets.GOOGLE_SPREADSHEET_ID }}
      RESEND_API_KEY:                ${{ secrets.RESEND_API_KEY }}
      RESEND_FROM_EMAILS:            ${{ secrets.RESEND_FROM_EMAILS }}
      SEND_DELAY_MIN_SECONDS:        "120"
      SEND_DELAY_MAX_SECONDS:        "180"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python + uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: uv sync

      - name: Escribir Service Account JSON a archivo temporal
        run: |
          echo "$GOOGLE_SERVICE_ACCOUNT_JSON" > /tmp/sa.json
          echo "GOOGLE_SERVICE_ACCOUNT_JSON=/tmp/sa.json" >> $GITHUB_ENV

      - name: Ejecutar pipeline
        run: |
          MAX=${{ github.event.inputs.max_emails || '100' }}
          DAYS=${{ github.event.inputs.days_back || '0' }}
          uv run python main.py --run-now --max-emails "$MAX" --days-back "$DAYS"
